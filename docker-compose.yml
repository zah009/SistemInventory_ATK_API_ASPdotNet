services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: atk-sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong!Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserverdata:/var/opt/mssql

  api:
    build:
      context: ./Atk
      dockerfile: Dockerfile
    container_name: atk-api
    depends_on:
      - db
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__DefaultConnection: "Server=db;Database=AtkDb;User Id=sa;Password=YourStrong!Passw0rd;TrustServerCertificate=True;"
      Jwt__Key: "GantiDenganKeyRandomMinimal32Karakter123456"
      Jwt__Issuer: "AtkApi"
      Jwt__Audience: "AtkUsers"

volumes:
  sqlserverdata: